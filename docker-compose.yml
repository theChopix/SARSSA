# SARSSA — build & run the full stack:
#
#   * backend  — FastAPI app (uvicorn)            http://localhost:8000
#   * mlflow   — MLflow tracking + UI server       http://localhost:5000
#   * frontend — React/Vite build served by nginx  http://localhost:5173
#
# The backend talks to the `mlflow` service over HTTP; the server owns
# the SQLite store (`sqlite:///mlflow.db`) and proxies artifact reads and
# writes into `./mlartifacts` (mlflow-artifacts:/ URIs — no host paths in
# the DB). This mirrors the local `just run` + `just mlflow` setup.
#
# Secrets (OPENAI_API_KEY, CHAT_MODEL, EMBEDDING_MODEL) come from the
# project's .env file at runtime — they are never baked into the image.

name: sarssa

services:
  backend:
    image: sarssa-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/src
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Datasets — code defaults to ../data/<dataset> (i.e. /app/data).
      - ./data:/app/data
      # Kept for legacy: pre-switch runs store host-absolute artifact
      # paths in mlflow.db; this mount makes them resolve in-container.
      - ${PWD}/src/mlartifacts:${PWD}/src/mlartifacts
    # Optional GPU: set GPU_COUNT=all on a host with NVIDIA GPU + toolkit.
    # Defaults to 0 — reserves nothing, so it still runs CPU-only anywhere.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-0}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  mlflow:
    # Reuses the backend image (mlflow is a runtime dependency); only the
    # command differs. The build section is identical to `backend`, so
    # the same image tag is produced and Docker's layer cache makes this
    # a no-op rebuild — Compose just won't try to pull it from a registry.
    image: sarssa-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/src
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:///mlflow.db
      - --artifacts-destination
      - ./mlartifacts
      - --serve-artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - localhost:5000,127.0.0.1:5000,mlflow:5000
    ports:
      - "5000:5000"
    volumes:
      # The server owns the SQLite store and the artifacts destination.
      - ./src/mlflow.db:/app/src/mlflow.db
      - ./src/mlartifacts:/app/src/mlartifacts
      # Kept for legacy: same mount as the backend — the MLflow UI serves
      # pre-switch runs by the absolute path stored in mlflow.db.
      - ${PWD}/src/mlartifacts:${PWD}/src/mlartifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: sarssa-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
