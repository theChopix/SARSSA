# SARSSA — build & run the full stack behind a single entry point:
#
#   * frontend — nginx: serves the React build AND fronts the other two
#                services (/api/ -> backend, /mlflow/ -> mlflow)
#                http://localhost:5173
#   * backend  — FastAPI app (uvicorn), internal only
#   * mlflow   — MLflow tracking + UI server, internal only
#
# The backend talks to the `mlflow` service over HTTP; the server owns
# the SQLite store (`sqlite:///mlflow-data/mlflow.db`) and proxies artifact
# reads and writes into `./mlartifacts` (mlflow-artifacts:/ URIs — no host
# paths in the DB). This mirrors the local `just run` + `just mlflow` setup.
#
# For direct host access to backend/mlflow during development, create a
# local docker-compose.override.yml publishing ports 8000/5000.
#
# Secrets (OPENAI_API_KEY, CHAT_MODEL, EMBEDDING_MODEL) come from the
# project's .env file at runtime — they are never baked into the image.

name: sarssa

services:
  backend:
    image: sarssa-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/src
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    # Reachable only from the compose network (via the frontend nginx).
    expose:
      - "8000"
    volumes:
      # Datasets — code defaults to ../data/<dataset> (i.e. /app/data).
      - ./data:/app/data
    # Optional GPU: set GPU_COUNT=all on a host with NVIDIA GPU + toolkit.
    # Defaults to 0 — reserves nothing, so it still runs CPU-only anywhere.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-0}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  mlflow:
    # Reuses the backend image (mlflow is a runtime dependency); only the
    # command differs. The build section is identical to `backend`, so
    # the same image tag is produced and Docker's layer cache makes this
    # a no-op rebuild — Compose just won't try to pull it from a registry.
    image: sarssa-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/src
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:///mlflow-data/mlflow.db
      - --artifacts-destination
      - ./mlartifacts
      - --serve-artifacts
      - --static-prefix
      - /mlflow
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      # PUBLIC_HOST (host:port) admits requests forwarded by the public
      # reverse proxy; unset it falls back to localhost (local dev).
      - --allowed-hosts
      - localhost:5000,127.0.0.1:5000,mlflow:5000,localhost:5173,${PUBLIC_HOST:-localhost}
    # Reachable only from the compose network (via the frontend nginx).
    expose:
      - "5000"
    volumes:
      # The server owns the SQLite store and the artifacts destination.
      # Mounting the DB's directory (not the file) keeps SQLite journal
      # files on the host and works on a fresh clone where no DB exists.
      - ./src/mlflow-data:/app/src/mlflow-data
      - ./src/mlartifacts:/app/src/mlartifacts
    healthcheck:
      # --static-prefix moves /health under the prefix as well.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/mlflow/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: sarssa-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
