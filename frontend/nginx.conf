server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths are handled by the React router,
    # so fall back to index.html instead of returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed asset bundle, never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
