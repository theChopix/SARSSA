server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single entry point: this nginx also fronts the backend and MLflow,
    # so the whole app is served from one origin (no CORS, no baked hosts).

    # Backend — the trailing slash on proxy_pass STRIPS the /api prefix;
    # backend routes live at the root (/pipelines, /items, /plugins).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
    }

    # MLflow
    location /mlflow/ {
        proxy_pass http://mlflow:5000;
        proxy_set_header Host $host;
    }

    # Single-page app: unknown paths are handled by the React router,
    # so fall back to index.html instead of returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed asset bundle, never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
