# IANA timezone name used for human-readable timestamps (e.g. pipeline
# run names). Must be a valid zoneinfo key, e.g. "Europe/Prague",
# "UTC", "America/New_York".
timezone: "Europe/Prague"

mlflow:
  experiment_name: "pipeline_experiments_02"
  # Fallback for tests/scripts; `just run` and Docker override it with
  # MLFLOW_TRACKING_URI so all tracking goes through the MLflow server.
  tracking_uri: "sqlite:///mlflow-data/mlflow.db"
  # Used only with the direct-SQLite fallback; the server's artifact
  # destination is set on its command line (justfile / docker-compose).
  artifact_root: "./mlartifacts"
  ui_base_url: "http://localhost:5000"

plugin_categories:
  dataset_loading:
    order: 0
    type: "one_time"
    display_name: "Dataset Loading"
    description: "Load and split the recommender dataset."
  training_cfm:
    order: 1
    type: "one_time"
    display_name: "Training CFM"
    description: "Train the collaborative filtering model."
  training_sae:
    order: 2
    type: "one_time"
    display_name: "Training SAE"
    description: "Train a sparse autoencoder on CFM embeddings."
  neuron_labeling:
    order: 3
    type: "one_time"
    display_name: "Neuron Labeling"
    description: "Assign human-readable labels to SAE neurons."
  labeling_evaluation:
    order: 4
    type: "multi_run"
    display_name: "Labeling Evaluation"
    has_visual_results: true
    description: "Visualize the structure of the neuron labels."
  inspection:
    order: 5
    type: "multi_run"
    display_name: "Inspection"
    has_visual_results: true
    description: "Explore which items an SAE neuron represents."
  steering:
    order: 6
    type: "multi_run"
    display_name: "Steering"
    has_visual_results: true
    description: "Recommend with chosen neurons boosted or suppressed."
